name: Computer Stats CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t server-monitor .

      - name: Run Docker Container
        run: docker run server-monitor
