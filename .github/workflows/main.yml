name: Computer Stats CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/computer-stats:latest .

      - name: Run Docker Container Test
        run: |
          docker run -d -p 5000:5000 --name test-container ${{ secrets.DOCKER_USERNAME }}/computer-stats:latest
          sleep 10
          docker ps
          docker stop test-container
          docker rm test-container

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/computer-stats:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/computer-stats:latest
            docker stop computer-stats-web || true
            docker rm computer-stats-web || true
            docker run -d --name computer-stats-web -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/computer-stats:latest
